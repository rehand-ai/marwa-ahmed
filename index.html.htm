<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body style="font-family: Arial; text-align:center; background-color:#f5f5f5; padding:40px;">

<h1 style="color:#007BFF;">Hi Marwa! 🎉</h1>

<p style="font-size:18px;">A little surprise for you!</p>

<p><b>Click the gift box to open your surprise!</b></p>

<img id="giftBox"
src="https://pngimg.com/uploads/gift/gift_PNG5983.png"
width="240"
style="cursor:pointer; transition:0.3s;"
onclick="openGift()"
onmouseover="this.style.transform='scale(1.1)'"
onmouseout="this.style.transform='scale(1)'">

<p id="message" style="font-size:20px; color:#007BFF; margin-top:25px;"></p>

<p id="funnyText" style="font-size:22px; margin-top:15px; display:none;">
⚠️ Warning: Celebration Mode Activated 😂
</p>

<div id="funnyGif" style="display:none; margin-top:20px;">
<img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExb3M0dWQ2cjR2ODBqdGY1enE0a3I3dWtyajBoMTZ6N29pMDUzY2p4dSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/lhbE0q3n92XWzj1BUh/giphy.gif" width="280">

</div>

<script>
function openGift() {

document.getElementById("giftBox").src =
"https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExbThycDU5YzRiczc2ZjNycXFubmlneDB0YzBrYjkxY2hydzN4cWwxbCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/BoxNmGpdWqniMaWi4I/giphy.gif";

document.getElementById("message").innerHTML =
"🎉 Congratulations! 🎉<br>So proud of you — you truly deserve it ❤️<br>The best Senior Manager!";

confetti({
particleCount:150,
spread:90,
origin:{ y:0.6 }
});

setTimeout(function(){
document.getElementById("funnyText").style.display="block";
},1200);

setTimeout(function(){
document.getElementById("funnyGif").style.display="block";
},2000);

}
</script>

</body>
</html>
